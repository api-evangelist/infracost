aid: infracost
name: Infracost
description: >-
  Infracost is a cloud cost estimation tool for Terraform that shows infrastructure
  cost breakdowns and diffs directly in pull requests. Infracost provides an API
  for programmatic access to cloud pricing data and cost estimates.
